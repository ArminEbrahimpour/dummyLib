name: Build and Release

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v1.0.0, v2.1.3

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            filename: dummylib-linux-amd64
          - goos: linux
            goarch: arm64
            filename: dummylib-linux-arm64
          - goos: darwin
            goarch: amd64
            filename: dummylib-darwin-amd64
          - goos: darwin
            goarch: arm64
            filename: dummylib-darwin-arm64
          - goos: windows
            goarch: amd64
            filename: dummylib-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o ${{ matrix.filename }} ./cmd

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.filename }}
          token: ${{ secrets.GITHUB_TOKEN }}
