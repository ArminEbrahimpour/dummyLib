<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opening PDF…</title>
</head>
<body>
<script>
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("book");
    if (!bookId) {
      document.body.textContent = "Missing book ID.";
      return;
    }

    let lastPage = 1;
    try {
      const resp = await fetch("/api/books/" + bookId);
      if (resp.ok) {
        const book = await resp.json();
        lastPage = book.last_page || 1;
      }
    } catch (e) {
      console.error("Could not fetch last page", e);
    }

    // Build the PDF.js viewer URL
const viewerURL = "/viewer/web/viewer.html"
                + "?file=" + encodeURIComponent("/api/books/" + bookId + "/pdf")
                + "&bookId=" + bookId
                + "#page=" + lastPage;
    window.location.replace(viewerURL);
  }
  init();
</script>
</body>
</html>
